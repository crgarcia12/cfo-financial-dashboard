<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>
  
  <rect width="1000" height="600" fill="#F8FAFC"/>

  <!-- Top Diamond -->
  <g filter="url(#shadow)">
    <polygon points="400,80 500,30 600,80 500,130" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="500" y="75" font-family="sans-serif" font-size="20" font-weight="bold" fill="#D97706" text-anchor="middle">TESTABILITY GATE</text>
    <text x="500" y="100" font-family="sans-serif" font-size="16" fill="#D97706" text-anchor="middle">Can we test this app?</text>
  </g>

  <!-- Arrows -->
  <path d="M 500 130 L 500 160 L 175 160 L 175 190" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 500 130 L 500 190" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 500 130 L 500 160 L 825 160 L 825 190" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Left Card: Track A -->
  <g transform="translate(30, 200)" filter="url(#shadow)">
    <rect width="290" height="320" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="145" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">TRACK A — Testable</text>
    
    <text x="20" y="70" font-family="sans-serif" font-size="16" fill="#059669">✅ Can build &amp; run locally</text>
    <text x="20" y="95" font-family="sans-serif" font-size="16" fill="#059669">✅ Endpoints reachable</text>
    <text x="20" y="120" font-family="sans-serif" font-size="16" fill="#059669">✅ Dependencies mockable</text>
    
    <line x1="20" y1="140" x2="270" y2="140" stroke="#059669" stroke-width="1" stroke-dasharray="4"/>
    
    <text x="20" y="170" font-family="sans-serif" font-size="16" font-weight="bold" fill="#059669">Outcome:</text>
    <text x="20" y="195" font-family="sans-serif" font-size="16" fill="#059669">• Gherkin capture</text>
    <text x="35" y="215" font-family="sans-serif" font-size="14" fill="#059669">(existing behavior)</text>
    <text x="20" y="240" font-family="sans-serif" font-size="16" fill="#059669">• Green baseline tests</text>
    <text x="35" y="260" font-family="sans-serif" font-size="14" fill="#059669">(must PASS)</text>
    <text x="20" y="285" font-family="sans-serif" font-size="16" fill="#059669">• Full regression safety net</text>
  </g>

  <!-- Center Card: Hybrid -->
  <g transform="translate(355, 200)" filter="url(#shadow)">
    <rect width="290" height="320" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="145" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">HYBRID — Mixed</text>
    
    <text x="20" y="70" font-family="sans-serif" font-size="16" fill="#1E40AF">Some features testable,</text>
    <text x="20" y="95" font-family="sans-serif" font-size="16" fill="#1E40AF">others not.</text>
    
    <line x1="20" y1="140" x2="270" y2="140" stroke="#1E40AF" stroke-width="1" stroke-dasharray="4"/>
    
    <text x="20" y="170" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E40AF">Strategy:</text>
    <text x="20" y="195" font-family="sans-serif" font-size="16" fill="#1E40AF">• Testable → Track A</text>
    <text x="20" y="220" font-family="sans-serif" font-size="16" fill="#1E40AF">• Non-testable → Track B</text>
    <text x="20" y="245" font-family="sans-serif" font-size="16" fill="#1E40AF">• Promote B→A when</text>
    <text x="35" y="265" font-family="sans-serif" font-size="14" fill="#1E40AF">testability improves</text>
  </g>

  <!-- Right Card: Track B -->
  <g transform="translate(680, 200)" filter="url(#shadow)">
    <rect width="290" height="320" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
    <text x="145" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#EF4444" text-anchor="middle">TRACK B — Doc-Only</text>
    
    <text x="20" y="70" font-family="sans-serif" font-size="16" fill="#EF4444">❌ Cannot build locally</text>
    <text x="20" y="95" font-family="sans-serif" font-size="16" fill="#EF4444">❌ Dependencies unreachable</text>
    <text x="20" y="120" font-family="sans-serif" font-size="16" fill="#EF4444">❌ No test environment</text>
    
    <line x1="20" y1="140" x2="270" y2="140" stroke="#EF4444" stroke-width="1" stroke-dasharray="4"/>
    
    <text x="20" y="170" font-family="sans-serif" font-size="16" font-weight="bold" fill="#EF4444">Outcome:</text>
    <text x="20" y="195" font-family="sans-serif" font-size="16" fill="#EF4444">• Gherkin-like prose</text>
    <text x="20" y="220" font-family="sans-serif" font-size="16" fill="#EF4444">• Manual verification</text>
    <text x="35" y="240" font-family="sans-serif" font-size="14" fill="#EF4444">checklists</text>
    <text x="20" y="265" font-family="sans-serif" font-size="16" fill="#EF4444">• Testability roadmap</text>
  </g>
</svg>