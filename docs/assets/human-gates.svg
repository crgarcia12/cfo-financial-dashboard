<svg width="1000" height="700" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <rect width="1000" height="700" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle">Human Approval Gates</text>
  <text x="500" y="65" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="middle">Nothing ships without your sign-off</text>

  <!-- Left Column: Greenfield -->
  <g transform="translate(30, 100)">
    <text x="20" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1E40AF">Greenfield Gates</text>
    <line x1="20" y1="20" x2="20" y2="460" stroke="#CBD5E1" stroke-width="2"/>

    <!-- 1. Phase 0 Exit -->
    <circle cx="20" cy="40" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 0 Exit</text>
    <text x="200" y="45" font-family="sans-serif" font-size="14" fill="#64748B">— Shell setup approved</text>

    <!-- 2. Phase 1a -->
    <circle cx="20" cy="100" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 1a</text>
    <text x="200" y="105" font-family="sans-serif" font-size="14" fill="#64748B">— PRD + FRDs approved</text>

    <!-- 3. Phase 1b -->
    <circle cx="20" cy="160" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="165" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 1b</text>
    <text x="200" y="165" font-family="sans-serif" font-size="14" fill="#64748B">— UI/UX prototypes approved</text>

    <!-- 4. Phase 1c -->
    <circle cx="20" cy="220" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="225" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 1c</text>
    <text x="200" y="225" font-family="sans-serif" font-size="14" fill="#64748B">— Increment plan approved</text>

    <!-- 5. Phase 1d -->
    <circle cx="20" cy="280" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="285" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 1d</text>
    <text x="200" y="285" font-family="sans-serif" font-size="14" fill="#64748B">— Tech stack + ADRs approved</text>

    <!-- 6. Step 1 -->
    <circle cx="20" cy="340" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="345" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Step 1 (Inc)</text>
    <text x="200" y="345" font-family="sans-serif" font-size="14" fill="#64748B">— Gherkin scenarios approved</text>

    <!-- 7. Step 3 -->
    <circle cx="20" cy="400" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="405" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Step 3 (Inc)</text>
    <text x="200" y="405" font-family="sans-serif" font-size="14" fill="#64748B">— PR code review</text>

    <!-- 8. Step 4 -->
    <circle cx="20" cy="460" r="6" fill="#3B82F6" stroke="#EFF6FF" stroke-width="2"/>
    <text x="40" y="465" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Step 4 (Inc)</text>
    <text x="200" y="465" font-family="sans-serif" font-size="14" fill="#64748B">— Deployment verified</text>
  </g>

  <!-- Right Column: Brownfield -->
  <g transform="translate(510, 100)">
    <text x="20" y="0" font-family="sans-serif" font-size="18" font-weight="bold" fill="#D97706">Brownfield Gates</text>
    <line x1="20" y1="20" x2="20" y2="460" stroke="#CBD5E1" stroke-width="2"/>

    <!-- 1. B1 Exit -->
    <circle cx="20" cy="40" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B1 Exit</text>
    <text x="200" y="45" font-family="sans-serif" font-size="14" fill="#64748B">— Extraction accuracy</text>

    <!-- 2. B2a -->
    <circle cx="20" cy="100" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="105" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B2a</text>
    <text x="200" y="105" font-family="sans-serif" font-size="14" fill="#64748B">— PRD approved</text>

    <!-- 3. B2b -->
    <circle cx="20" cy="160" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="165" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B2b</text>
    <text x="200" y="165" font-family="sans-serif" font-size="14" fill="#64748B">— FRDs approved</text>

    <!-- 4. B2c -->
    <circle cx="20" cy="220" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="225" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B2c</text>
    <text x="200" y="225" font-family="sans-serif" font-size="14" fill="#64748B">— Spec refinement</text>

    <!-- 5. Testability Gate -->
    <circle cx="20" cy="280" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="285" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Testability Gate</text>
    <text x="200" y="285" font-family="sans-serif" font-size="14" fill="#64748B">— Track A/B/Hybrid decision</text>

    <!-- 6. Green Baseline -->
    <circle cx="20" cy="340" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="345" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Green Baseline</text>
    <text x="200" y="345" font-family="sans-serif" font-size="14" fill="#64748B">— Per feature tests pass (Track A)</text>

    <!-- 7. Track B Review -->
    <circle cx="20" cy="400" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="405" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Track B Review</text>
    <text x="200" y="405" font-family="sans-serif" font-size="14" fill="#64748B">— Per feature behavioral docs</text>

    <!-- 8. Path Selection -->
    <circle cx="20" cy="460" r="6" fill="#F59E0B" stroke="#FEF3C7" stroke-width="2"/>
    <text x="40" y="465" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Path Selection</text>
    <text x="200" y="465" font-family="sans-serif" font-size="14" fill="#64748B">— Choose paths</text>
  </g>

  <!-- Bottom Pill -->
  <g transform="translate(250, 620)" filter="url(#shadow)">
    <rect width="500" height="50" rx="25" fill="#3B82F6"/>
    <text x="250" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PAUSE → REVIEW → APPROVE → CONTINUE</text>
  </g>
</svg>