<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes typeIn {
        0% {
          width: 0;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        100% {
          width: 100%;
          opacity: 1;
        }
      }

      @keyframes flashValue {
        0% {
          fill: #58a6ff;
        }
        50% {
          fill: #79c0ff;
        }
        100% {
          fill: #58a6ff;
        }
      }

      @keyframes dropIn {
        0% {
          transform: translateY(-30px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes scrollLog {
        0%, 5% {
          transform: translateY(0);
        }
        25%, 30% {
          transform: translateY(-25px);
        }
        50%, 55% {
          transform: translateY(-50px);
        }
        75%, 80% {
          transform: translateY(-75px);
        }
        100% {
          transform: translateY(-75px);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      /* Base styles */
      body {
        background: #0d1117;
      }

      .bg {
        fill: #0d1117;
      }

      .text-primary {
        fill: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      }

      .text-secondary {
        fill: #8b949e;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 12px;
      }

      .section-title {
        fill: #e6edf3;
        font-weight: 600;
        font-size: 16px;
      }

      .card {
        stroke: #30363d;
        stroke-width: 1.5;
        fill: none;
      }

      /* LEFT COLUMN - State Snapshot */
      .state-card {
        fill: rgba(88, 166, 255, 0.1);
        stroke: #58a6ff;
      }

      .state-key {
        fill: #79c0ff;
        font-size: 13px;
        font-weight: 500;
      }

      .state-value {
        fill: #58a6ff;
        font-size: 13px;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      }

      .state-value.flash {
        animation: flashValue 0.6s ease-in-out;
      }

      /* CENTER COLUMN - Audit Log */
      .log-entry {
        fill: #7ee787;
        font-size: 12px;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        overflow: hidden;
      }

      .log-timestamp {
        fill: #8b949e;
      }

      .log-status-pass {
        fill: #7ee787;
      }

      .log-status-progress {
        fill: #d29922;
      }

      .log-container {
        overflow: hidden;
      }

      .log-entries-group {
        animation: scrollLog 10s ease-in-out infinite;
      }

      /* RIGHT COLUMN - Git Persistence */
      .git-commit {
        fill: rgba(210, 168, 255, 0.1);
        stroke: #d2a8ff;
      }

      .commit-hash {
        fill: #d2a8ff;
        font-size: 11px;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
      }

      .commit-message {
        fill: #e6edf3;
        font-size: 12px;
        font-weight: 500;
      }

      .git-commit.animate {
        animation: dropIn 0.4s ease-out forwards;
      }

      .git-commit:nth-child(1) { animation-delay: 2.5s; }
      .git-commit:nth-child(2) { animation-delay: 5s; }
      .git-commit:nth-child(3) { animation-delay: 7.5s; }

      /* Connecting arrows */
      .arrow {
        stroke: #30363d;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }

      .arrow-label {
        fill: #8b949e;
        font-size: 11px;
      }

      /* Banner */
      .banner-text {
        fill: #7ee787;
        font-size: 13px;
        font-weight: 500;
      }

      .indicator {
        fill: #7ee787;
      }

      .pulse-dot {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#30363d" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="450"/>

  <!-- Title -->
  <text x="450" y="25" class="section-title" text-anchor="middle" font-size="20" font-weight="700">
    State Management for Resumability &amp; Auditability
  </text>

  <!-- LEFT COLUMN: State Snapshot (state.json) -->
  <g id="state-column">
    <text x="75" y="55" class="section-title" text-anchor="middle">State Snapshot</text>
    <text x="75" y="72" class="text-secondary" text-anchor="middle" font-size="11">(state.json)</text>

    <!-- Card background -->
    <rect x="20" y="90" width="110" height="200" rx="6" class="state-card"/>

    <!-- JSON-like content -->
    <text x="30" y="110" class="state-key">{</text>

    <text x="38" y="130" class="state-key">phase:</text>
    <text x="110" y="130" class="state-value" id="state-phase">"2-delivery"</text>

    <text x="38" y="150" class="state-key">increment:</text>
    <text x="110" y="150" class="state-value" id="state-increment">1</text>

    <text x="38" y="170" class="state-key">step:</text>
    <text x="110" y="170" class="state-value" id="state-step">"impl"</text>

    <text x="38" y="190" class="state-key">status:</text>
    <text x="110" y="190" class="state-value" id="state-status">"in_progress"</text>

    <text x="38" y="210" class="state-key">human_gates:</text>
    <text x="110" y="210" class="state-value" id="state-gates">{approved}</text>

    <text x="30" y="235" class="state-key">}</text>
  </g>

  <!-- CENTER COLUMN: Audit Log (audit.log) -->
  <g id="log-column">
    <text x="450" y="55" class="section-title" text-anchor="middle">Action Timeline</text>
    <text x="450" y="72" class="text-secondary" text-anchor="middle" font-size="11">(audit.log)</text>

    <!-- Log card background -->
    <rect x="310" y="90" width="280" height="200" rx="6" class="card"/>

    <!-- Log entries with scroll animation -->
    <g class="log-container" clip-path="url(#log-clip)">
      <defs>
        <clipPath id="log-clip">
          <rect x="310" y="90" width="280" height="200"/>
        </clipPath>
      </defs>

      <g class="log-entries-group">
        <!-- Entry 1 -->
        <text x="320" y="115" class="log-timestamp">[2024-01-15 10:23]</text>
        <text x="460" y="115" class="log-entry">spec-refinement:</text>
        <text x="620" y="115" class="log-status-pass">PASS ✓</text>

        <!-- Entry 2 -->
        <text x="320" y="140" class="log-timestamp">[2024-01-15 11:45]</text>
        <text x="460" y="140" class="log-entry">ui-ux-design:</text>
        <text x="620" y="140" class="log-status-pass">PASS ✓</text>

        <!-- Entry 3 -->
        <text x="320" y="165" class="log-timestamp">[2024-01-15 14:02]</text>
        <text x="460" y="165" class="log-entry">gherkin-generation:</text>
        <text x="620" y="165" class="log-status-pass">PASS ✓</text>

        <!-- Entry 4 -->
        <text x="320" y="190" class="log-timestamp">[2024-01-15 15:30]</text>
        <text x="460" y="190" class="log-entry">implementation:</text>
        <text x="620" y="190" class="log-status-progress">IN_PROGRESS…</text>

        <!-- Repeat for scrolling effect -->
        <text x="320" y="230" class="log-timestamp">[2024-01-15 10:23]</text>
        <text x="460" y="230" class="log-entry">spec-refinement:</text>
        <text x="620" y="230" class="log-status-pass">PASS ✓</text>

        <text x="320" y="255" class="log-timestamp">[2024-01-15 11:45]</text>
        <text x="460" y="255" class="log-entry">ui-ux-design:</text>
        <text x="620" y="255" class="log-status-pass">PASS ✓</text>
      </g>
    </g>
  </g>

  <!-- RIGHT COLUMN: Git Persistence -->
  <g id="git-column">
    <text x="825" y="55" class="section-title" text-anchor="middle">Git Persistence</text>
    <text x="825" y="72" class="text-secondary" text-anchor="middle" font-size="11">(Shared via Git)</text>

    <!-- Git commits -->
    <g class="git-commit animate">
      <rect x="755" y="95" width="140" height="45" rx="4"/>
      <text x="765" y="113" class="commit-hash">8f2a9c1</text>
      <text x="765" y="130" class="commit-message">state: Phase 2 Step 3</text>
    </g>

    <g class="git-commit animate">
      <rect x="755" y="160" width="140" height="45" rx="4"/>
      <text x="765" y="178" class="commit-hash">d4e1b7f</text>
      <text x="765" y="195" class="commit-message">state: gherkin approved</text>
    </g>

    <g class="git-commit animate">
      <rect x="755" y="225" width="140" height="45" rx="4"/>
      <text x="765" y="243" class="commit-hash">a3c8d2e</text>
      <text x="765" y="260" class="commit-message">state: UI/UX approved</text>
    </g>

    <!-- Git commit chain line -->
    <line x1="825" y1="140" x2="825" y2="160" class="arrow" stroke="#d2a8ff" marker-end="none"/>
    <line x1="825" y1="205" x2="825" y2="225" class="arrow" stroke="#d2a8ff" marker-end="none"/>

    <!-- Initial commit indicator -->
    <circle cx="825" cy="290" r="3" class="indicator"/>
    <text x="825" y="310" class="text-secondary" text-anchor="middle" font-size="10">initial</text>
  </g>

  <!-- Connecting Arrows -->
  <g id="connections">
    <!-- Every action → state.json -->
    <path d="M 180 220 Q 240 190 310 180" class="arrow" stroke="#58a6ff"/>
    <text x="240" y="175" class="arrow-label">Every action</text>

    <!-- Every action → audit.log -->
    <path d="M 280 250 Q 370 240 390 230" class="arrow" stroke="#7ee787"/>

    <!-- Both → git -->
    <path d="M 590 230 Q 700 200 750 170" class="arrow" stroke="#d2a8ff"/>
    <text x="665" y="195" class="arrow-label">Both committed</text>
  </g>

  <!-- Bottom Banner -->
  <rect x="0" y="330" width="900" height="120" fill="rgba(88, 166, 255, 0.05)" stroke="#30363d" stroke-width="1"/>

  <g id="banner">
    <circle cx="40" cy="365" r="5" class="indicator pulse-dot"/>
    <text x="55" y="370" class="banner-text">Resume from any point</text>

    <circle cx="280" cy="365" r="5" class="indicator pulse-dot"/>
    <text x="295" y="370" class="banner-text">Full audit trail</text>

    <circle cx="490" cy="365" r="5" class="indicator pulse-dot"/>
    <text x="505" y="370" class="banner-text">Shared via git</text>

    <circle cx="700" cy="365" r="5" class="indicator pulse-dot"/>
    <text x="715" y="370" class="banner-text">No external database</text>

    <!-- Info lines -->
    <text x="40" y="395" class="text-secondary" font-size="11">
      State snapshots enable recovery
    </text>
    <text x="40" y="410" class="text-secondary" font-size="11">
      at any checkpoint. Complete
    </text>
    <text x="40" y="425" class="text-secondary" font-size="11">
      traceability through git history.
    </text>
  </g>
</svg>
