<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1000" height="700" fill="#F8FAFC"/>

  <!-- Left Column: Greenfield -->
  <g filter="url(#shadow)">
    <rect x="30" y="30" width="450" height="520" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
    <text x="255" y="70" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#059669">GREENFIELD — Build New</text>
    
    <!-- Step 1 -->
    <g transform="translate(50, 90)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 1: Discovery</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">PRD → FRD → UI/UX → Tech Stack</text>
    </g>
    <!-- Arrow -->
    <path d="M 255 150 L 255 165" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 2 -->
    <g transform="translate(50, 170)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 2: Tests</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">E2E, Gherkin, Unit stubs → Red baseline</text>
    </g>
    <!-- Arrow -->
    <path d="M 255 230 L 255 245" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 3 -->
    <g transform="translate(50, 250)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 2: Implement</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">API + Web parallel → Integration</text>
    </g>
    <!-- Arrow -->
    <path d="M 255 310 L 255 325" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 4 -->
    <g transform="translate(50, 330)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 2: Deploy</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">Azure provision, Smoke tests, Live</text>
    </g>
  </g>

  <!-- Right Column: Brownfield -->
  <g filter="url(#shadow)">
    <rect x="520" y="30" width="450" height="520" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
    <text x="745" y="70" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#D97706">BROWNFIELD — Modernize Existing</text>
    
    <!-- Step 1 -->
    <g transform="translate(540, 90)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B1: Extract</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">Scanner, Deps, Arch, API, Data, Tests</text>
    </g>
    <!-- Arrow -->
    <path d="M 745 150 L 745 165" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 2 -->
    <g transform="translate(540, 170)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">B2: Spec-Enable</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">PRD, FRDs, Refinement</text>
    </g>
    <!-- Arrow -->
    <path d="M 745 230 L 745 245" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 3: Gate -->
    <g transform="translate(540, 250)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Testability Gate</text>
      <!-- Sub pills -->
      <rect x="10" y="32" width="70" height="20" rx="4" fill="#D1FAE5" />
      <text x="45" y="46" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" fill="#065F46">Track A</text>
      <rect x="90" y="32" width="70" height="20" rx="4" fill="#DBEAFE" />
      <text x="125" y="46" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" fill="#1E40AF">Hybrid</text>
      <rect x="170" y="32" width="70" height="20" rx="4" fill="#FEE2E2" />
      <text x="205" y="46" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" fill="#991B1B">Track B</text>
    </g>
    <!-- Arrow -->
    <path d="M 745 310 L 745 325" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 4 -->
    <g transform="translate(540, 330)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Assess → Plan</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">Targeted assessment + increments</text>
    </g>
    <!-- Arrow -->
    <path d="M 745 390 L 745 405" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

    <!-- Step 5 -->
    <g transform="translate(540, 410)">
      <rect width="410" height="60" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1E293B">Phase 2: Deliver</text>
      <text x="10" y="45" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#64748B">Track-aware pipeline</text>
    </g>
  </g>

  <!-- Convergence Pill -->
  <g filter="url(#shadow)">
    <rect x="150" y="580" width="700" height="80" rx="40" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="500" y="615" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E40AF">Same Delivery Pipeline</text>
    <text x="500" y="640" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#1E40AF">Tests → Contracts → Implement → Deploy</text>
  </g>
  
  <!-- Connecting arrows from columns to pill -->
  <path d="M 255 550 L 255 580" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 745 550 L 745 580" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

</svg>