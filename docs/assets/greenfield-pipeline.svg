<svg width="1000" height="750" viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1000" height="750" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="40" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Start with a Product Idea</text>
  <line x1="500" y1="55" x2="500" y2="80" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 0 -->
  <g filter="url(#shadow)">
    <rect x="180" y="85" width="640" height="75" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/>
    <text x="500" y="115" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">Phase 0: Shell Setup</text>
    <text x="500" y="140" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Pick template: Next.js / .NET / Python — Project structure, tests, Azure infra</text>
  </g>
  <circle cx="840" cy="122" r="6" fill="#D97706"/>
  <line x1="500" y1="160" x2="500" y2="195" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 1 -->
  <g filter="url(#shadow)">
    <rect x="140" y="200" width="720" height="260" rx="12" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="500" y="230" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">Phase 1: Product Discovery</text>

    <!-- 1a -->
    <rect x="165" y="250" width="325" height="65" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="327" y="275" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF" text-anchor="middle">1a: Spec Refinement</text>
    <text x="327" y="298" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="13" fill="#475569" text-anchor="middle">PRD → FRDs</text>
    <circle cx="480" cy="282" r="5" fill="#D97706"/>

    <!-- 1b -->
    <rect x="510" y="250" width="325" height="65" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="672" y="275" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF" text-anchor="middle">1b: UI/UX Design</text>
    <text x="672" y="298" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="13" fill="#475569" text-anchor="middle">HTML Prototypes</text>
    <circle cx="825" cy="282" r="5" fill="#D97706"/>

    <!-- 1c -->
    <rect x="165" y="330" width="325" height="65" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="327" y="355" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF" text-anchor="middle">1c: Increment Planning</text>
    <text x="327" y="378" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Walking Skeleton First</text>
    <circle cx="480" cy="362" r="5" fill="#D97706"/>

    <!-- 1d -->
    <rect x="510" y="330" width="325" height="65" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="672" y="355" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF" text-anchor="middle">1d: Tech Stack</text>
    <text x="672" y="378" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Research + ADRs</text>
    <circle cx="825" cy="362" r="5" fill="#D97706"/>

    <text x="500" y="435" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Orange dots = Human Gates (approval required)</text>
  </g>
  <line x1="500" y1="460" x2="500" y2="500" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <g filter="url(#shadow)">
    <rect x="140" y="505" width="720" height="160" rx="12" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="500" y="535" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">Phase 2: Increment Delivery</text>
    <text x="500" y="575" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#065F46" text-anchor="middle">Tests → Contracts → Implement → Deploy</text>

    <!-- Step icons -->
    <circle cx="330" cy="610" r="16" fill="white" stroke="#EF4444" stroke-width="2"/>
    <text x="330" y="615" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="bold">T</text>
    <circle cx="410" cy="610" r="16" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <text x="410" y="615" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="bold">C</text>
    <circle cx="490" cy="610" r="16" fill="white" stroke="#059669" stroke-width="2"/>
    <text x="490" y="615" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#059669" text-anchor="middle" font-weight="bold">I</text>
    <circle cx="570" cy="610" r="16" fill="white" stroke="#D97706" stroke-width="2"/>
    <text x="570" y="615" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#D97706" text-anchor="middle" font-weight="bold">D</text>

    <text x="500" y="650" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#047857" text-anchor="middle">Repeat for each increment — Human gates: Gherkin review, PR review</text>
  </g>
  <line x1="500" y1="665" x2="500" y2="700" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bottom -->
  <text x="500" y="730" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#059669" text-anchor="middle">Production on Azure</text>
</svg>
