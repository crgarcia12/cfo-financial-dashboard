<svg width="1000" height="500" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="1000" height="500" fill="#F8FAFC"/>

  <!-- Left: State Persistence -->
  <g filter="url(#shadow)">
    <rect x="30" y="20" width="460" height="390" rx="12" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="260" y="55" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1E40AF" text-anchor="middle">State Persistence</text>

    <!-- File entries -->
    <rect x="55" y="75" width="410" height="50" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="75" y="105" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF">state.json</text>
    <text x="215" y="105" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#475569">— Where you are (phase, increment, status)</text>

    <rect x="55" y="140" width="410" height="50" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="75" y="170" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF">audit.log</text>
    <text x="205" y="170" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#475569">— What happened (append-only timeline)</text>

    <rect x="55" y="205" width="410" height="50" rx="8" fill="white" stroke="#93C5FD" stroke-width="1"/>
    <text x="75" y="235" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF">models.json</text>
    <text x="225" y="235" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#475569">— Which AI model per role</text>

    <!-- Benefits -->
    <line x1="55" y1="275" x2="465" y2="275" stroke="#93C5FD" stroke-width="1"/>
    <text x="260" y="305" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">Committed to git after every action</text>
    <text x="260" y="335" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">Resume from any interruption</text>
    <text x="260" y="365" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">Full audit trail via git history</text>
    <text x="260" y="395" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">No external database required</text>
  </g>

  <!-- Right: Human Gates -->
  <g filter="url(#shadow)">
    <rect x="510" y="20" width="460" height="390" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="740" y="55" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#D97706" text-anchor="middle">Human Gates</text>

    <!-- Gate entries -->
    <circle cx="540" cy="90" r="6" fill="#059669"/>
    <text x="560" y="95" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Spec Review — PRD + FRDs approved</text>

    <circle cx="540" cy="125" r="6" fill="#059669"/>
    <text x="560" y="130" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Design Review — UI/UX prototypes</text>

    <circle cx="540" cy="160" r="6" fill="#059669"/>
    <text x="560" y="165" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Tech Stack — ADRs reviewed</text>

    <circle cx="540" cy="195" r="6" fill="#059669"/>
    <text x="560" y="200" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Gherkin — Test scenarios approved</text>

    <circle cx="540" cy="230" r="6" fill="#059669"/>
    <text x="560" y="235" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Code Review — PR approved</text>

    <circle cx="540" cy="265" r="6" fill="#059669"/>
    <text x="560" y="270" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#334155">Deploy — Smoke tests pass</text>

    <line x1="530" y1="290" x2="950" y2="290" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>

    <circle cx="540" cy="315" r="6" fill="#D97706"/>
    <text x="560" y="320" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#92400E" font-weight="bold">Testability Gate — Track A/B decision</text>

    <circle cx="540" cy="350" r="6" fill="#D97706"/>
    <text x="560" y="355" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#92400E">Green Baseline — Per-feature verification</text>

    <circle cx="540" cy="385" r="6" fill="#D97706"/>
    <text x="560" y="390" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#92400E">Path Selection — Choose paths</text>
  </g>

  <!-- Bottom pill -->
  <rect x="250" y="435" width="500" height="40" rx="20" fill="#3B82F6"/>
  <text x="500" y="460" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">PAUSE → REVIEW → APPROVE → CONTINUE</text>
</svg>
