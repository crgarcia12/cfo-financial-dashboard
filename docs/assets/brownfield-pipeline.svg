<svg width="1000" height="850" viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>
  
  <rect width="1000" height="850" fill="#F8FAFC"/>

  <!-- Top: Existing Codebase -->
  <text x="500" y="40" font-family="sans-serif" font-size="22" font-weight="bold" fill="#1E293B" text-anchor="middle">Existing Codebase</text>
  <line x1="500" y1="50" x2="500" y2="78" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 1: B1 Extract -->
  <g filter="url(#shadow)">
    <rect x="170" y="80" width="660" height="100" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="500" y="110" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">B1: Extract</text>
    <text x="500" y="135" font-family="sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">Scanner · Deps · Architecture · API · Data Models · Tests</text>
    <text x="500" y="160" font-family="sans-serif" font-size="14" font-style="italic" fill="#1E40AF" text-anchor="middle">Pure facts, zero judgment</text>
  </g>
  <line x1="500" y1="180" x2="500" y2="208" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 2: B2 Spec-Enable -->
  <g filter="url(#shadow)">
    <rect x="210" y="210" width="580" height="90" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="500" y="240" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">B2: Spec-Enable</text>
    <text x="500" y="265" font-family="sans-serif" font-size="14" fill="#1E40AF" text-anchor="middle">PRD Generation · FRD Generation · Spec Refinement</text>
    <text x="500" y="285" font-family="sans-serif" font-size="14" font-style="italic" fill="#1E40AF" text-anchor="middle">Always produces valuable documentation</text>
  </g>
  <line x1="500" y1="300" x2="500" y2="328" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Testability Gate -->
  <g filter="url(#shadow)">
    <rect x="170" y="330" width="660" height="130" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="500" y="360" font-family="sans-serif" font-size="18" font-weight="bold" fill="#D97706" text-anchor="middle">TESTABILITY GATE — Can this app be tested?</text>
    
    <!-- Sub-boxes -->
    <g transform="translate(190, 380)">
      <!-- Track A -->
      <g>
        <rect x="0" y="0" width="180" height="60" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
        <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#059669" text-anchor="middle">Track A: Green Baseline</text>
      </g>
      
      <!-- Hybrid -->
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="180" height="60" rx="4" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
        <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">Hybrid: Mix A+B</text>
      </g>

      <!-- Track B -->
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="180" height="60" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
        <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">Track B: Doc-Only</text>
      </g>
    </g>
  </g>
  <line x1="500" y1="460" x2="500" y2="488" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Path Selection -->
  <g filter="url(#shadow)">
    <rect x="170" y="490" width="660" height="85" rx="8" fill="#E0E7FF" stroke="#4F46E5" stroke-width="2"/>
    <text x="500" y="520" font-family="sans-serif" font-size="18" font-weight="bold" fill="#4F46E5" text-anchor="middle">Path Selection</text>
    <text x="500" y="550" font-family="sans-serif" font-size="14" fill="#4F46E5" text-anchor="middle">Modernize · Rewrite · Cloud-Native · Extend · Security · Performance</text>
  </g>
  <line x1="500" y1="575" x2="500" y2="603" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 5: Assess -> Plan -> Deliver -->
  <g filter="url(#shadow)">
    <rect x="210" y="605" width="580" height="85" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="500" y="635" font-family="sans-serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">Assess → Plan → Deliver</text>
    <text x="500" y="660" font-family="sans-serif" font-size="14" fill="#059669" text-anchor="middle">Track-aware Phase 2 pipeline · Incremental delivery</text>
  </g>
  <line x1="500" y1="690" x2="500" y2="718" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Bottom: Production on Azure -->
  <text x="500" y="750" font-family="sans-serif" font-size="22" font-weight="bold" fill="#059669" text-anchor="middle">Production on Azure</text>
</svg>