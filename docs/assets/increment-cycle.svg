<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
    </marker>
  </defs>
  
  <rect width="1000" height="520" fill="#F8FAFC"/>

  <!-- Step 1: TESTS (Top Center) -->
  <g transform="translate(370, 30)">
    <rect width="260" height="130" rx="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#B91C1C" text-anchor="middle">Step 1: TESTS</text>
    <line x1="20" y1="35" x2="240" y2="35" stroke="#EF4444" stroke-width="1"/>
    <text x="130" y="60" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">E2E Playwright specs</text>
    <text x="130" y="80" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Gherkin scenarios</text>
    <text x="130" y="100" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Cucumber steps</text>
    <text x="130" y="120" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#B91C1C" text-anchor="middle">Red baseline</text>
  </g>

  <!-- Step 2: CONTRACTS (Right Center) -->
  <g transform="translate(700, 190)">
    <rect width="260" height="130" rx="12" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E40AF" text-anchor="middle">Step 2: CONTRACTS</text>
    <line x1="20" y1="35" x2="240" y2="35" stroke="#3B82F6" stroke-width="1"/>
    <text x="130" y="60" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">OpenAPI specs</text>
    <text x="130" y="85" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">TypeScript types</text>
    <text x="130" y="110" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Infra contracts</text>
  </g>

  <!-- Step 3: IMPLEMENT (Bottom Center) -->
  <g transform="translate(370, 350)">
    <rect width="260" height="130" rx="12" fill="#D1FAE5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#047857" text-anchor="middle">Step 3: IMPLEMENT</text>
    <line x1="20" y1="35" x2="240" y2="35" stroke="#059669" stroke-width="1"/>
    <text x="130" y="60" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">API slice (Express)</text>
    <text x="130" y="80" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Web slice (Next.js)</text>
    <text x="130" y="100" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Integration wiring</text>
    <text x="130" y="120" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#047857" text-anchor="middle">All tests pass</text>
  </g>

  <!-- Step 4: DEPLOY (Left Center) -->
  <g transform="translate(40, 190)">
    <rect width="260" height="130" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="25" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#B45309" text-anchor="middle">Step 4: DEPLOY</text>
    <line x1="20" y1="35" x2="240" y2="35" stroke="#D97706" stroke-width="1"/>
    <text x="130" y="60" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">azd provision</text>
    <text x="130" y="80" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">azd deploy</text>
    <text x="130" y="100" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" fill="#1E293B" text-anchor="middle">Smoke tests</text>
    <text x="130" y="120" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#B45309" text-anchor="middle">Live on Azure</text>
  </g>

  <!-- Arrows -->
  <path d="M640 95 Q 830 95 830 180" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M830 330 Q 830 415 640 415" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M360 415 Q 170 415 170 330" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M170 180 Q 170 95 360 95" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Center Text -->
  <text x="500" y="265" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Repeat per increment</text>
</svg>
