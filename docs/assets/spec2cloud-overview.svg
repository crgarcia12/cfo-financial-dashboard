<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="1000" height="350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect width="1000" height="350" fill="#F8FAFC"/>
  
  <!-- Box 1: Specs -->
  <g filter="url(#shadow)">
    <rect x="80" y="95" width="240" height="160" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="200" y="145" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#1E40AF">Specs</text>
    <text x="200" y="180" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#1E40AF">PRD, FRDs</text>
    <text x="200" y="205" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#1E40AF">Gherkin Scenarios</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <path d="M 320 175 L 370 175" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <!-- Box 2: Tests -->
  <g filter="url(#shadow)">
    <rect x="380" y="95" width="240" height="160" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="500" y="145" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#059669">Tests</text>
    <text x="500" y="180" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#059669">Generated from specs</text>
    <text x="500" y="205" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#059669">Drive implementation</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <path d="M 620 175 L 670 175" stroke="#94A3B8" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

  <!-- Box 3: Cloud -->
  <g filter="url(#shadow)">
    <rect x="680" y="95" width="240" height="160" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
    <text x="800" y="145" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#D97706">Cloud</text>
    <text x="800" y="180" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#D97706">Deployed on Azure</text>
    <text x="800" y="205" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" fill="#D97706">Live &amp; verified</text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="320" text-anchor="middle" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="16" font-style="italic" fill="#64748B">AI-Powered · Human-Approved · Spec-Driven</text>
</svg>