<svg width="1000" height="350" viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>
  
  <rect width="1000" height="350" fill="#F8FAFC"/>

  <!-- Box 1: Existing App -->
  <g transform="translate(30, 50)" filter="url(#shadow)">
    <rect width="280" height="230" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
    <text x="140" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#475569" text-anchor="middle">Existing App</text>
    <text x="140" y="80" font-family="sans-serif" font-size="16" fill="#475569" text-anchor="middle">Running code with</text>
    <text x="140" y="105" font-family="sans-serif" font-size="16" fill="#475569" text-anchor="middle">undocumented behavior</text>
    
    <!-- Icon Placeholder -->
    <circle cx="140" cy="160" r="30" fill="#CBD5E1"/>
    <text x="140" y="168" font-family="monospace" font-size="24" fill="#475569" text-anchor="middle">&lt;/&gt;</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="310" y1="165" x2="360" y2="165" stroke="#64748B" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Capture as Tests -->
  <g transform="translate(370, 50)" filter="url(#shadow)">
    <rect width="280" height="230" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="2"/>
    <text x="140" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E40AF" text-anchor="middle">Capture as Tests</text>
    <text x="20" y="70" font-family="sans-serif" font-size="16" fill="#1E40AF">• Gherkin scenarios</text>
    <text x="20" y="95" font-family="sans-serif" font-size="16" fill="#1E40AF">• @existing-behavior</text>
    <text x="20" y="120" font-family="sans-serif" font-size="16" fill="#1E40AF">• Cucumber steps</text>
    <text x="20" y="145" font-family="sans-serif" font-size="16" fill="#1E40AF">• Playwright e2e specs</text>
    
    <rect x="20" y="170" width="240" height="40" rx="4" fill="#1E40AF"/>
    <text x="140" y="196" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Must PASS on current app</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="650" y1="165" x2="700" y2="165" stroke="#64748B" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Safety Net Ready -->
  <g transform="translate(710, 50)" filter="url(#shadow)">
    <rect width="280" height="230" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
    <text x="140" y="35" font-family="sans-serif" font-size="20" font-weight="bold" fill="#059669" text-anchor="middle">Safety Net Ready</text>
    <text x="20" y="70" font-family="sans-serif" font-size="16" fill="#059669">✅ All tests pass</text>
    <text x="20" y="95" font-family="sans-serif" font-size="16" fill="#059669">✅ Regression protection</text>
    <text x="20" y="120" font-family="sans-serif" font-size="16" fill="#059669">✅ Behavioral contract</text>
    
    <text x="140" y="180" font-family="sans-serif" font-size="22" font-weight="bold" fill="#059669" text-anchor="middle">Ready for changes!</text>
  </g>

  <!-- Bottom Text -->
  <text x="500" y="320" font-family="sans-serif" font-size="14" font-style="italic" fill="#64748B" text-anchor="middle">If a test fails → fix the TEST (it misunderstands behavior), not the app</text>
</svg>